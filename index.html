<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#050810">
  <title>CVD SCALPER | Mobile</title>
  <style>
    :root{--bg:#050810;--card:#0a0f1c;--neon:#00d4ff;--green:#00ff88;--red:#ff3366;--orange:#ff9500;--text:#e0e6ed;--muted:#6b7280;--border:#1e293b}
    *{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;-webkit-tap-highlight-color:transparent}
    body{background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px}
    header{text-align:center;padding:1.5rem 1rem;border-bottom:1px solid var(--border);background:var(--card)}
    .logo{font-weight:900;font-size:1.8rem;letter-spacing:2px;background:linear-gradient(90deg,var(--green),var(--neon));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .status{margin-top:0.5rem;font-size:0.85rem;color:var(--muted)}
    .ws-status{display:inline-block;padding:0.3rem 0.8rem;border-radius:20px;font-weight:600;margin-top:0.5rem}
    .ws-status.connected{background:rgba(0,255,136,0.15);color:var(--green)}
    .ws-status.disconnected{background:rgba(255,51,102,0.15);color:var(--red)}
    main{padding:1rem;max-width:600px;margin:0 auto}
    .asset-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1rem;margin-bottom:1rem}
    .header-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
    .asset-name{font-weight:700;font-size:1.2rem}
    .price{font-weight:800;font-size:1.4rem}
    .price.up{color:var(--green)}.price.down{color:var(--red)}
    .metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:0.5rem;margin:1rem 0}
    .metric{background:rgba(30,41,59,0.5);padding:0.7rem;border-radius:8px;text-align:center}
    .metric-label{font-size:0.65rem;color:var(--muted);text-transform:uppercase}
    .metric-value{font-weight:700;margin-top:0.3rem;font-size:0.95rem}
    .signal-box{text-align:center;padding:1rem;border-radius:10px;margin-top:1rem;font-weight:800;font-size:1.1rem;border:2px solid}
    .signal-box.buy{background:rgba(0,255,136,0.1);color:var(--green);border-color:var(--green)}
    .signal-box.sell{background:rgba(255,51,102,0.1);color:var(--red);border-color:var(--red)}
    .signal-box.neutral{background:rgba(255,149,0,0.05);color:var(--orange);border-color:var(--orange)}
    .btn{width:100%;padding:0.9rem;margin-top:0.8rem;border:none;border-radius:10px;font-weight:700;cursor:pointer;font-size:0.9rem}
    .btn-primary{background:var(--neon);color:var(--bg)}
    .btn-secondary{background:rgba(30,41,59,0.6);color:var(--text);border:1px solid var(--border)}
    .loading{text-align:center;padding:2rem;color:var(--muted)}
    @media(max-width:480px){.metrics{grid-template-columns:1fr 1fr}}
  </style>
</head>
<body>
  <header>
    <div class="logo">⚡ CVD SCALPER</div>
    <div class="status">Real-Time Crypto Signals</div>
    <div class="ws-status disconnected" id="ws-status">Connecting...</div>
  </header>

  <main id="cards-container">
    <div class="loading">Initializing data stream...</div>
  </main>
  <script>
    const CONFIG = {
      symbols: ['btcusdt', 'ethusdt'],
      wsUrl: 'wss://fstream.binance.com/stream?streams=btcusdt@trade/btcusdt@kline_5m/ethusdt@trade/ethusdt@kline_5m'
    };

    let state = {
      ws: null,
      data: {
        'BTCUSDT': { symbol: 'BTCUSDT', price: 0, cvd: 0, candles: [], trades: [] },
        'ETHUSDT': { symbol: 'ETHUSDT', price: 0, cvd: 0, candles: [], trades: [] }
      }
    };

    function initWS() {
      state.ws = new WebSocket(CONFIG.wsUrl);
      
      state.ws.onopen = () => {
        document.getElementById('ws-status').className = 'ws-status connected';
        document.getElementById('ws-status').textContent = '● LIVE DATA';
      };
      
      state.ws.onclose = () => {
        document.getElementById('ws-status').className = 'ws-status disconnected';
        document.getElementById('ws-status').textContent = '● RECONNECTING...';
        setTimeout(initWS, 3000);
      };
      
      state.ws.onerror = () => state.ws.close();
      
      state.ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        handleData(msg);
      };
    }

    function handleData(msg) {
      const stream = msg.stream;
      const sym = stream.split('@')[0].toUpperCase();
      
      if (!state.data[sym]) return;
      
      if (stream.includes('@trade')) {
        const t = msg.data;
        const qty = parseFloat(t.q);
        const isBuyerMaker = t.m;
        state.data[sym].cvd += isBuyerMaker ? -qty : qty;
        state.data[sym].trades.push({ t: Date.now(), d: isBuyerMaker ? -qty : qty });
        if (state.data[sym].trades.length > 100) state.data[sym].trades = state.data[sym].trades.slice(-100);
      } else if (stream.includes('@kline')) {        const k = msg.data.k;
        if (k.x) {
          state.data[sym].candles.push({ c: +k.c, v: +k.v });
          if (state.data[sym].candles.length > 50) state.data[sym].candles = state.data[sym].candles.slice(-50);
        }
        state.data[sym].price = +k.c;
      }
      
      renderUI();
    }

    function renderUI() {
      const container = document.getElementById('cards-container');
      container.innerHTML = Object.values(state.data).map(asset => {
        const priceChange = asset.candles.length > 1 ? asset.price - asset.candles[asset.candles.length-2].c : 0;
        const isUp = priceChange >= 0;
        
        return `
          <div class="asset-card">
            <div class="header-row">
              <span class="asset-name">${asset.symbol}</span>
              <span class="price ${isUp ? 'up' : 'down'}">$${asset.price.toFixed(2)}</span>
            </div>
            <div class="metrics">
              <div class="metric">
                <div class="metric-label">CVD</div>
                <div class="metric-value">${asset.cvd.toFixed(2)}</div>
              </div>
              <div class="metric">
                <div class="metric-label">Trades</div>
                <div class="metric-value">${asset.trades.length}</div>
              </div>
              <div class="metric">
                <div class="metric-label">Candles</div>
                <div class="metric-value">${asset.candles.length}</div>
              </div>
            </div>
            <div class="signal-box neutral">
              ${asset.cvd > 0 ? 'BUY PRESSURE' : asset.cvd < 0 ? 'SELL PRESSURE' : 'NEUTRAL'}
            </div>
            <button class="btn btn-primary" onclick="alert('${asset.symbol} CVD: ' + state.data['${asset.symbol}'].cvd.toFixed(2))">
              📊 VIEW DETAILS
            </button>
          </div>
        `;
      }).join('');
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {      initWS();
    });
  </script>
</body>
</html>
