<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#050810">
  <title>CVD SCALPER</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
    body{background:#050810;color:#e0e6ed;min-height:100vh;padding:1rem}
    .header{text-align:center;padding:1.5rem 0;border-bottom:1px solid #1e293b;margin-bottom:1.5rem}
    .logo{font-size:1.8rem;font-weight:900;background:linear-gradient(90deg,#00ff88,#00d4ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .status{margin-top:0.5rem;padding:0.4rem 1rem;border-radius:20px;display:inline-block;font-size:0.85rem;font-weight:600}
    .status.connected{background:rgba(0,255,136,0.15);color:#00ff88}
    .status.disconnected{background:rgba(255,51,102,0.15);color:#ff3366}
    .card{background:#0a0f1c;border:1px solid #1e293b;border-radius:12px;padding:1.2rem;margin-bottom:1rem}
    .row{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
    .name{font-size:1.2rem;font-weight:700}
    .price{font-size:1.5rem;font-weight:800}
    .price.up{color:#00ff88}.price.down{color:#ff3366}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:0.8rem}
    .box{background:rgba(30,41,59,0.5);padding:0.8rem;border-radius:8px;text-align:center}
    .label{font-size:0.7rem;color:#6b7280;text-transform:uppercase;margin-bottom:0.3rem}
    .value{font-size:1.1rem;font-weight:700}
    .signal{margin-top:1rem;padding:1rem;border-radius:10px;text-align:center;font-weight:800;font-size:1.1rem;border:2px solid}
    .signal.buy{background:rgba(0,255,136,0.1);color:#00ff88;border-color:#00ff88}
    .signal.sell{background:rgba(255,51,102,0.1);color:#ff3366;border-color:#ff3366}
    .signal.neutral{background:rgba(255,149,0,0.05);color:#ff9500;border-color:#ff9500}
    .error{background:rgba(255,51,102,0.1);border:1px solid #ff3366;color:#ff3366;padding:1rem;border-radius:8px;margin:1rem 0;text-align:center}
    .nav{position:fixed;bottom:0;left:0;right:0;background:rgba(10,15,28,0.95);backdrop-filter:blur(10px);border-top:1px solid #1e293b;display:flex;justify-content:space-around;padding:0.8rem 0 1.2rem}
    .nav-item{text-align:center;font-size:0.75rem;color:#6b7280;cursor:pointer}
    .nav-item.active{color:#00d4ff}
    .nav-icon{font-size:1.3rem;margin-bottom:0.2rem}
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">⚡ CVD SCALPER</div><br>
    <div class="status disconnected" id="status">Connecting...</div>
  </div>

  <div id="content">
    <div class="error" id="error" style="display:none"></div>
    <div id="cards"></div>
  </div>

  <div class="nav">
    <div class="nav-item active"><div class="nav-icon">📊</div>Signals</div>
    <div class="nav-item"><div class="nav-icon">📝</div>Trades</div>    <div class="nav-item"><div class="nav-icon">ℹ️</div>Info</div>
  </div>

  <script>
    const symbols = ['btcusdt', 'ethusdt'];
    let ws = null;
    let data = {
      'BTCUSDT': { price: 0, cvd: 0, trades: 0, candles: 0 },
      'ETHUSDT': { price: 0, cvd: 0, trades: 0, candles: 0 }
    };

    function connect() {
      const status = document.getElementById('status');
      status.textContent = 'Connecting...';
      status.className = 'status disconnected';

      // Binance Futures WebSocket
      const streams = 'btcusdt@trade/btcusdt@kline_5m/ethusdt@trade/ethusdt@kline_5m';
      ws = new WebSocket(`wss://fstream.binance.com/ws/${streams}`);

      ws.onopen = () => {
        status.textContent = '● LIVE';
        status.className = 'status connected';
        document.getElementById('error').style.display = 'none';
      };

      ws.onclose = () => {
        status.textContent = '● OFFLINE - Reconnecting...';
        status.className = 'status disconnected';
        setTimeout(connect, 3000);
      };

      ws.onerror = (err) => {
        document.getElementById('error').textContent = 'Connection error. Retrying...';
        document.getElementById('error').style.display = 'block';
        ws.close();
      };

      ws.onmessage = (event) => {
        try {
          const msg = JSON.parse(event.data);
          processData(msg);
          render();
        } catch (e) {
          console.error('Parse error:', e);
        }
      };
    }

    function processData(msg) {      const stream = msg.stream || '';
      const symbol = stream.split('@')[0].toUpperCase();
      
      if (!data[symbol]) return;

      if (stream.includes('@trade')) {
        const t = msg.data;
        const qty = parseFloat(t.q);
        const isBuyerMaker = t.m;
        data[symbol].cvd += isBuyerMaker ? -qty : qty;
        data[symbol].trades++;
      } else if (stream.includes('@kline')) {
        const k = msg.data.k;
        if (k.x) data[symbol].candles++;
        data[symbol].price = parseFloat(k.c);
      }
    }

    function render() {
      const cards = document.getElementById('cards');
      cards.innerHTML = Object.entries(data).map(([sym, d]) => {
        const isUp = d.cvd >= 0;
        return `
          <div class="card">
            <div class="row">
              <div class="name">${sym}</div>
              <div class="price ${isUp ? 'up' : 'down'}">$${d.price.toFixed(2)}</div>
            </div>
            <div class="grid">
              <div class="box">
                <div class="label">CVD</div>
                <div class="value">${d.cvd.toFixed(2)}</div>
              </div>
              <div class="box">
                <div class="label">Trades</div>
                <div class="value">${d.trades}</div>
              </div>
              <div class="box">
                <div class="label">Candles</div>
                <div class="value">${d.candles}</div>
              </div>
              <div class="box">
                <div class="label">Signal</div>
                <div class="value">${isUp ? '🟢 BUY' : '🔴 SELL'}</div>
              </div>
            </div>
            <div class="signal ${isUp ? 'buy' : 'sell'}">
              ${isUp ? 'BUY PRESSURE' : 'SELL PRESSURE'}
            </div>
          </div>        `;
      }).join('');
    }

    // Start connection when page loads
    window.addEventListener('DOMContentLoaded', () => {
      connect();
    });
  </script>
</body>
</html>
