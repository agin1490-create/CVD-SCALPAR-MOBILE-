<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#050810">
  <title>CVD SCALPER PRO</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,monospace}
    body{background:#050810;color:#e0e6ed;min-height:100vh;padding:1rem;padding-bottom:90px}
    .header{text-align:center;padding:1.5rem 0;border-bottom:1px solid #1e293b;margin-bottom:1rem}
    .logo{font-size:1.6rem;font-weight:900;background:linear-gradient(90deg,#00ff88,#00d4ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .subtitle{font-size:0.75rem;color:#6b7280;margin-top:0.3rem}
    .status{margin-top:0.5rem;padding:0.3rem 0.8rem;border-radius:20px;display:inline-block;font-size:0.8rem;font-weight:600}
    .status.connected{background:rgba(0,255,136,0.15);color:#00ff88}
    .status.disconnected{background:rgba(255,51,102,0.15);color:#ff3366}
    .status.error{background:rgba(255,149,0,0.15);color:#ff9500}
    .card{background:#0a0f1c;border:1px solid #1e293b;border-radius:12px;padding:1rem;margin-bottom:1rem}
    .row{display:flex;justify-content:space-between;align-items:center;margin-bottom:0.8rem}
    .name{font-size:1.1rem;font-weight:700}
    .price{font-size:1.3rem;font-weight:800}
    .price.up{color:#00ff88}.price.down{color:#ff3366}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:0.6rem;margin:0.8rem 0}
    .box{background:rgba(30,41,59,0.5);padding:0.6rem;border-radius:8px;text-align:center}
    .label{font-size:0.65rem;color:#6b7280;text-transform:uppercase;margin-bottom:0.2rem}
    .value{font-size:0.95rem;font-weight:700}
    .signal{margin-top:0.8rem;padding:0.9rem;border-radius:10px;text-align:center;font-weight:800;font-size:1rem;border:2px solid}
    .signal.buy{background:rgba(0,255,136,0.1);color:#00ff88;border-color:#00ff88}
    .signal.sell{background:rgba(255,51,102,0.1);color:#ff3366;border-color:#ff3366}
    .signal.neutral{background:rgba(255,149,0,0.05);color:#ff9500;border-color:#ff9500}
    .btn{width:100%;padding:0.8rem;margin-top:0.6rem;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-size:0.85rem}
    .btn-primary{background:#00d4ff;color:#050810}
    .btn-success{background:#00ff88;color:#050810}
    .btn-danger{background:#ff3366;color:white}
    .error-msg{background:rgba(255,51,102,0.1);border:1px solid #ff3366;color:#ff3366;padding:0.8rem;border-radius:8px;margin:1rem 0;font-size:0.8rem;word-break:break-all}
    .nav{position:fixed;bottom:0;left:0;right:0;background:rgba(10,15,28,0.98);backdrop-filter:blur(10px);border-top:1px solid #1e293b;display:flex;justify-content:space-around;padding:0.7rem 0 calc(0.7rem + env(safe-area-inset-bottom));z-index:100}
    .nav-item{text-align:center;font-size:0.7rem;color:#6b7280;cursor:pointer}
    .nav-item.active{color:#00d4ff}
    .nav-icon{font-size:1.2rem;margin-bottom:0.1rem}
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">⚡ CVD SCALPER PRO</div>
    <div class="subtitle">Confluence-Based Signals • Risk-Managed</div>
    <div class="status disconnected" id="status">Ready</div>
    <br>
    <button class="btn btn-primary" style="margin-top:1rem;max-width:200px;display:inline-block" onclick="connect()"> CONNECT NOW</button>
  </div>
  <div id="error-box" class="error-msg" style="display:none"></div>
  <div id="cards"></div>

  <div class="nav">
    <div class="nav-item active"><div class="nav-icon">📊</div>Signals</div>
    <div class="nav-item"><div class="nav-icon">📝</div>Trades</div>
    <div class="nav-item"><div class="nav-icon"></div>Stats</div>
  </div>

  <script>
    const CONFIG = {
      symbols: ['BTCUSDT', 'ETHUSDT'],
      wsUrl: 'wss://stream.binance.com:9443/ws'
    };

    let ws = null;
    let data = {};
    let isConnected = false;

    // Initialize Data Structure
    CONFIG.symbols.forEach(sym => {
      data[sym] = {
        price: 0, cvd: 0, trades: 0, vwap: 0, rsi: 50, ema9: 0, ema21: 0,
        cumVP: 0, cumV: 0, score: 0, signal: 'NEUTRAL', confidence: 0,
        conditions: []
      };
    });

    // Show Error in UI
    function showError(msg) {
      const box = document.getElementById('error-box');
      box.textContent = '⚠️ ' + msg;
      box.style.display = 'block';
      console.error(msg);
    }

    // Connect to WebSocket
    function connect() {
      const status = document.getElementById('status');
      const btn = document.querySelector('.btn-primary');
      
      if (ws && ws.readyState === WebSocket.OPEN) {
        showError('Already connected!');
        return;
      }

      status.textContent = 'Connecting...';
      status.className = 'status disconnected';
      document.getElementById('error-box').style.display = 'none';      btn.style.display = 'none';

      // Create Combined Stream URL
      const streams = CONFIG.symbols.map(s => `${s.toLowerCase()}@trade`).join('/');
      const url = `${CONFIG.wsUrl}/${streams}`;
      
      console.log('Connecting to:', url);

      try {
        ws = new WebSocket(url);
      } catch (e) {
        showError('WebSocket creation failed: ' + e.message);
        status.textContent = 'Failed';
        btn.style.display = 'inline-block';
        return;
      }

      ws.onopen = () => {
        console.log('WebSocket Open');
        status.textContent = '● LIVE';
        status.className = 'status connected';
        isConnected = true;
        fetchInitialPrices(); // Fallback prices via REST
      };

      ws.onmessage = (event) => {
        try {
          const msg = JSON.parse(event.data);
          handleData(msg);
        } catch (e) {
          console.error('Parse error:', e);
        }
      };

      ws.onerror = (err) => {
        console.error('WS Error:', err);
        showError('Connection Error. Check internet or try again.');
        status.textContent = '● ERROR';
        status.className = 'status error';
        ws.close();
      };

      ws.onclose = () => {
        console.log('WS Closed');
        isConnected = false;
        status.textContent = '● DISCONNECTED';
        status.className = 'status disconnected';
        btn.style.display = 'inline-block';
        btn.textContent = '🔄 RECONNECT';
      };    }

    // Fallback: Get initial prices via REST API
    async function fetchInitialPrices() {
      try {
        const response = await fetch('https://api.binance.com/api/v3/ticker/price?symbols=["BTCUSDT","ETHUSDT"]');
        if (!response.ok) throw new Error('API Error');
        const prices = await response.json();
        prices.forEach(p => {
          if (data[p.symbol]) data[p.symbol].price = parseFloat(p.price);
        });
        render();
        console.log('Initial prices loaded');
      } catch (e) {
        console.warn('REST API failed:', e);
      }
    }

    // Handle Incoming Trade Data
    function handleData(msg) {
      // Binance stream format: { stream: "btcusdt@trade", data: { ... } }
      const streamName = msg.stream;
      if (!streamName) return;
      
      const symbol = streamName.split('@')[0].toUpperCase();
      const t = msg.data; // The trade object
      
      if (!data[symbol] || !t) return;

      const price = parseFloat(t.p);
      const qty = parseFloat(t.q);
      const isBuyerMaker = t.m; // true = seller initiated (red), false = buyer initiated (green)

      // Update Data
      data[symbol].price = price;
      data[symbol].trades++;
      
      // CVD Calculation
      // If isBuyerMaker is false, it's a market BUY -> +qty
      // If isBuyerMaker is true, it's a market SELL -> -qty
      data[symbol].cvd += isBuyerMaker ? -qty : qty;
      
      // VWAP Calculation (Cumulative)
      data[symbol].cumVP += price * qty;
      data[symbol].cumV += qty;
      data[symbol].vwap = data[symbol].cumV > 0 ? data[symbol].cumVP / data[symbol].cumV : price;

      // Generate Signal
      generateSignal(symbol);
            // Update UI
      render();
    }

    // Signal Logic
    function generateSignal(sym) {
      const d = data[sym];
      let score = 0;
      let conditions = [];

      // 1. CVD Trend
      const cvdBullish = d.cvd > 0;
      conditions.push({ name: 'CVD', val: cvdBullish });
      score += cvdBullish ? 1 : -1;

      // 2. Price vs VWAP
      const aboveVwap = d.price > d.vwap;
      conditions.push({ name: 'VWAP', val: aboveVwap });
      score += aboveVwap ? 1 : -1;

      // 3. RSI (Simplified for demo)
      conditions.push({ name: 'RSI', val: d.rsi < 70 }); // Just a placeholder check
      score += d.rsi < 70 ? 0.5 : -0.5;

      d.score = score;
      d.conditions = conditions;
      d.confidence = Math.min(1, Math.abs(score) / 3);

      if (score >= 2) d.signal = 'BUY';
      else if (score <= -2) d.signal = 'SELL';
      else d.signal = 'NEUTRAL';
    }

    // Render UI
    function render() {
      const container = document.getElementById('cards');
      container.innerHTML = Object.entries(data).map(([sym, d]) => `
        <div class="card">
          <div class="row">
            <div class="name">${sym}</div>
            <div class="price ${d.price > d.vwap ? 'up' : 'down'}">$${d.price.toFixed(2)}</div>
          </div>
          <div class="grid">
            <div class="box"><div class="label">CVD</div><div class="value">${d.cvd.toFixed(2)}</div></div>
            <div class="box"><div class="label">VWAP</div><div class="value">$${d.vwap.toFixed(0)}</div></div>
            <div class="box"><div class="label">Trades</div><div class="value">${d.trades}</div></div>
            <div class="box"><div class="label">Score</div><div class="value">${d.score.toFixed(1)}</div></div>
          </div>
          <div class="signal ${d.signal.toLowerCase()}">${d.signal}</div>
        </div>      `).join('');
    }

    // Initial Render (Empty State)
    window.addEventListener('DOMContentLoaded', () => {
      render();
      // Auto-connect after 1 second
      setTimeout(connect, 1000);
    });
  </script>
</body>
</html>
