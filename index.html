<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#050810">
  <title>CVD SCALPER PRO</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,monospace}
    body{background:#050810;color:#e0e6ed;min-height:100vh;padding:1rem;padding-bottom:90px}
    .header{text-align:center;padding:1.5rem 0;border-bottom:1px solid #1e293b;margin-bottom:1rem}
    .logo{font-size:1.6rem;font-weight:900;background:linear-gradient(90deg,#00ff88,#00d4ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .subtitle{font-size:0.75rem;color:#6b7280;margin-top:0.3rem}
    .status{margin-top:0.5rem;padding:0.3rem 0.8rem;border-radius:20px;display:inline-block;font-size:0.8rem;font-weight:600}
    .status.connected{background:rgba(0,255,136,0.15);color:#00ff88}
    .status.disconnected{background:rgba(255,51,102,0.15);color:#ff3366}
    .card{background:#0a0f1c;border:1px solid #1e293b;border-radius:12px;padding:1rem;margin-bottom:1rem}
    .card.strong-buy{border-color:#00ff88;box-shadow:0 0 20px rgba(0,255,136,0.2)}
    .card.strong-sell{border-color:#ff3366;box-shadow:0 0 20px rgba(255,51,102,0.2)}
    .row{display:flex;justify-content:space-between;align-items:center;margin-bottom:0.8rem}
    .name{font-size:1.1rem;font-weight:700}
    .price{font-size:1.3rem;font-weight:800}
    .price.up{color:#00ff88}.price.down{color:#ff3366}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:0.6rem;margin:0.8rem 0}
    .box{background:rgba(30,41,59,0.5);padding:0.6rem;border-radius:8px;text-align:center}
    .label{font-size:0.65rem;color:#6b7280;text-transform:uppercase;margin-bottom:0.2rem}
    .value{font-size:0.95rem;font-weight:700}
    .confluence{display:grid;grid-template-columns:1fr 1fr;gap:0.4rem;margin:0.8rem 0}
    .cond{display:flex;align-items:center;gap:0.4rem;padding:0.4rem;background:rgba(30,41,59,0.3);border-radius:6px;font-size:0.7rem}
    .dot{width:8px;height:8px;border-radius:50%}
    .dot.green{background:#00ff88}.dot.red{background:#ff3366}.dot.gray{background:#6b7280}
    .signal{margin-top:0.8rem;padding:0.9rem;border-radius:10px;text-align:center;font-weight:800;font-size:1rem;border:2px solid}
    .signal.strong-buy{background:rgba(0,255,136,0.15);color:#00ff88;border-color:#00ff88}
    .signal.buy{background:rgba(0,255,136,0.05);color:#00ff88;border-color:#00ff88;opacity:0.8}
    .signal.strong-sell{background:rgba(255,51,102,0.15);color:#ff3366;border-color:#ff3366}
    .signal.sell{background:rgba(255,51,102,0.05);color:#ff3366;border-color:#ff3366;opacity:0.8}
    .signal.neutral{background:rgba(255,149,0,0.05);color:#ff9500;border-color:#ff9500}
    .confidence{margin-top:0.5rem;font-size:0.75rem;color:#6b7280}
    .divergence{margin-top:0.5rem;padding:0.5rem;border-radius:6px;font-size:0.75rem;text-align:center}
    .divergence.bullish{background:rgba(0,255,136,0.1);color:#00ff88}
    .divergence.bearish{background:rgba(255,51,102,0.1);color:#ff3366}
    .risk-box{background:rgba(255,149,0,0.05);border:1px solid #ff9500;padding:0.6rem;border-radius:8px;margin-top:0.8rem;font-size:0.75rem}
    .btn{width:100%;padding:0.8rem;margin-top:0.6rem;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-size:0.85rem}
    .btn-primary{background:#00d4ff;color:#050810}
    .btn-success{background:#00ff88;color:#050810}
    .btn-danger{background:#ff3366;color:white}
    .nav{position:fixed;bottom:0;left:0;right:0;background:rgba(10,15,28,0.98);backdrop-filter:blur(10px);border-top:1px solid #1e293b;display:flex;justify-content:space-around;padding:0.7rem 0 calc(0.7rem + env(safe-area-inset-bottom));z-index:100}
    .nav-item{text-align:center;font-size:0.7rem;color:#6b7280;cursor:pointer}
    .nav-item.active{color:#00d4ff}    .nav-icon{font-size:1.2rem;margin-bottom:0.1rem}
    .modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.9);display:flex;align-items:flex-end;z-index:200;opacity:0;visibility:hidden;transition:all 0.3s}
    .modal.active{opacity:1;visibility:visible}
    .modal-content{background:#0a0f1c;width:100%;max-height:70vh;overflow-y:auto;border-top-left-radius:16px;border-top-right-radius:16px;padding:1.2rem}
    .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
    .close{background:none;border:none;color:#6b7280;font-size:1.5rem;cursor:pointer}
    .trade-item{display:flex;justify-content:space-between;padding:0.7rem;margin:0.4rem 0;background:rgba(30,41,59,0.5);border-radius:8px;font-size:0.8rem;border-left:3px solid}
    .trade-item.buy{border-left-color:#00ff88}.trade-item.sell{border-left-color:#ff3366}
    .stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.5rem;margin:1rem 0}
    .stat{text-align:center;padding:0.6rem;background:rgba(30,41,59,0.5);border-radius:8px}
    .stat-value{font-size:1.1rem;font-weight:700;margin-top:0.2rem}
    .stat-label{font-size:0.65rem;color:#6b7280}
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">⚡ CVD SCALPER PRO</div>
    <div class="subtitle">Confluence-Based Signals • Risk-Managed</div>
    <div class="status disconnected" id="status">Connecting...</div>
  </div>

  <div id="cards"></div>

  <div class="nav">
    <div class="nav-item active" onclick="showView('signals')"><div class="nav-icon">📊</div>Signals</div>
    <div class="nav-item" onclick="showView('trades')"><div class="nav-icon">📝</div>Trades</div>
    <div class="nav-item" onclick="showView('stats')"><div class="nav-icon">📈</div>Stats</div>
  </div>

  <div class="modal" id="tradeModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>📊 Paper Trading Stats</h3>
        <button class="close" onclick="closeModal()">&times;</button>
      </div>
      <div class="stats">
        <div class="stat">
          <div class="stat-label">Total Trades</div>
          <div class="stat-value" id="stat-total">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">Win Rate</div>
          <div class="stat-value" id="stat-winrate">0%</div>
        </div>
        <div class="stat">
          <div class="stat-label">P&L</div>
          <div class="stat-value" id="stat-pnl">0%</div>
        </div>
      </div>
      <div id="trade-list"></div>    </div>
  </div>

  <script>
    // ================= CONFIG =================
    const CONFIG = {
      symbols: ['BTCUSDT', 'ETHUSDT'],
      wsUrl: 'wss://stream.binance.com:9443/ws',
      riskPerTrade: 0.02, // 2% max risk
      stopLossPct: 0.005, // 0.5% stop loss
      minConfidence: 0.6 // Minimum 60% confidence to signal
    };

    // ================= STATE =================
    let ws = null;
    let data = {};
    let trades = JSON.parse(localStorage.getItem('cvd_trades') || '[]');

    // Initialize data structure
    CONFIG.symbols.forEach(sym => {
      data[sym] = {
        price: 0, cvd: 0, trades: 0, candles: 0,
        closes: [], volumes: [], highs: [], lows: [],
        vwap: 0, rsi: 50, ema9: 0, ema21: 0,
        cumVP: 0, cumV: 0,
        lastCVD: 0, lastPrice: 0,
        divergence: 'none', // 'bullish', 'bearish', 'none'
        score: 0, signal: 'NEUTRAL', confidence: 0
      };
    });

    // ================= WEBSOCKET =================
    function connect() {
      const status = document.getElementById('status');
      status.textContent = 'Connecting...';
      
      const streams = CONFIG.symbols.map(s => 
        `${s.toLowerCase()}@trade/${s.toLowerCase()}@kline_1m`
      ).join('/');
      
      ws = new WebSocket(`${CONFIG.wsUrl}/${streams}`);
      
      ws.onopen = () => {
        status.textContent = '● LIVE';
        status.className = 'status connected';
      };
      
      ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        handleData(msg);      };
      
      ws.onclose = () => {
        status.textContent = '● RECONNECTING...';
        status.className = 'status disconnected';
        setTimeout(connect, 3000);
      };
      
      ws.onerror = () => {
        status.textContent = '● ERROR';
        status.className = 'status disconnected';
      };
    }

    function handleData(msg) {
      if (!msg.stream) return;
      const sym = msg.stream.split('@')[0].toUpperCase();
      const d = data[sym];
      if (!d) return;

      if (msg.stream.includes('@trade')) {
        const t = msg.data;
        const price = parseFloat(t.p);
        const qty = parseFloat(t.q);
        const isBuyerMaker = t.m;
        
        d.price = price;
        d.cvd += isBuyerMaker ? -qty : qty;
        d.trades++;
        d.cumVP += price * qty;
        d.cumV += qty;
        d.vwap = d.cumV > 0 ? d.cumVP / d.cumV : price;
        
        // Track for divergence
        d.lastCVD = d.cvd;
        d.lastPrice = price;
        
      } else if (msg.stream.includes('@kline')) {
        const k = msg.data.k;
        if (k.x) { // Candle closed
          const close = parseFloat(k.c);
          const vol = parseFloat(k.v);
          const high = parseFloat(k.h);
          const low = parseFloat(k.l);
          
          d.closes.push(close);
          d.volumes.push(vol);
          d.highs.push(high);
          d.lows.push(low);
          d.candles++;          
          // Keep last 50 candles
          if (d.closes.length > 50) {
            d.closes.shift();
            d.volumes.shift();
            d.highs.shift();
            d.lows.shift();
          }
          
          // Calculate indicators
          calculateIndicators(d);
          checkDivergence(d);
        }
        d.price = parseFloat(k.c);
      }
      
      generateSignal(sym);
      render();
    }

    // ================= INDICATORS =================
    function calculateIndicators(d) {
      const closes = d.closes;
      const volumes = d.volumes;
      
      // RSI (14)
      if (closes.length >= 15) {
        let gains = 0, losses = 0;
        for (let i = closes.length - 14; i < closes.length; i++) {
          const diff = closes[i] - closes[i-1];
          if (diff >= 0) gains += diff;
          else losses -= diff;
        }
        const avgGain = gains / 14;
        const avgLoss = losses / 14;
        const rs = avgLoss === 0 ? 100 : avgGain / avgLoss;
        d.rsi = 100 - (100 / (1 + rs));
      }
      
      // EMA 9 & 21
      if (closes.length >= 21) {
        d.ema9 = calcEMA(closes, 9);
        d.ema21 = calcEMA(closes, 21);
      }
    }

    function calcEMA(arr, period) {
      const k = 2 / (period + 1);
      let ema = arr[0];
      for (let i = 1; i < arr.length; i++) {        ema = arr[i] * k + ema * (1 - k);
      }
      return ema;
    }

    function checkDivergence(d) {
      if (d.closes.length < 10) return;
      
      const recentCloses = d.closes.slice(-5);
      const recentCVDs = [];
      
      // Simple CVD tracking (last 5 values)
      for (let i = 0; i < 5; i++) {
        recentCVDs.push(d.cvd * (1 + Math.random() * 0.01)); // Simplified
      }
      
      const priceTrend = recentCloses[4] > recentCloses[0];
      const cvdTrend = recentCVDs[4] > recentCVDs[0];
      
      if (priceTrend && !cvdTrend) {
        d.divergence = 'bearish';
      } else if (!priceTrend && cvdTrend) {
        d.divergence = 'bullish';
      } else {
        d.divergence = 'none';
      }
    }

    // ================= SIGNAL ENGINE =================
    function generateSignal(sym) {
      const d = data[sym];
      let score = 0;
      let conditions = [];
      
      // 1. CVD Trend (weight: 2)
      const cvdBullish = d.cvd > 0;
      conditions.push({ name: 'CVD Trend', val: cvdBullish ? 1 : -1, weight: 2 });
      score += cvdBullish ? 2 : -2;
      
      // 2. Price vs VWAP (weight: 2)
      const aboveVWAP = d.price > d.vwap;
      conditions.push({ name: 'Price vs VWAP', val: aboveVWAP ? 1 : -1, weight: 2 });
      score += aboveVWAP ? 2 : -2;
      
      // 3. RSI (weight: 1.5)
      let rsiScore = 0;
      if (d.rsi < 30) rsiScore = 1.5;
      else if (d.rsi > 70) rsiScore = -1.5;
      else if (d.rsi > 40 && d.rsi < 60) rsiScore = 0.5;
      conditions.push({ name: `RSI (${d.rsi.toFixed(0)})`, val: rsiScore > 0 ? 1 : rsiScore < 0 ? -1 : 0, weight: 1.5 });      score += rsiScore;
      
      // 4. EMA Cross (weight: 1.5)
      const emaBullish = d.ema9 > d.ema21;
      conditions.push({ name: 'EMA 9/21', val: emaBullish ? 1 : -1, weight: 1.5 });
      score += emaBullish ? 1.5 : -1.5;
      
      // 5. Volume (weight: 1)
      const avgVol = d.volumes.length > 0 ? d.volumes.reduce((a,b)=>a+b,0)/d.volumes.length : 0;
      const volSpike = d.volumes.length > 0 && d.volumes[d.volumes.length-1] > avgVol * 1.5;
      conditions.push({ name: 'Volume', val: volSpike ? 1 : 0, weight: 1 });
      score += volSpike ? 1 : 0;
      
      // 6. Divergence (weight: 2)
      let divScore = 0;
      if (d.divergence === 'bullish') divScore = 2;
      else if (d.divergence === 'bearish') divScore = -2;
      conditions.push({ name: 'Divergence', val: divScore > 0 ? 1 : divScore < 0 ? -1 : 0, weight: 2 });
      score += divScore;
      
      // Calculate confidence (max possible score = 10)
      d.confidence = Math.min(1, Math.abs(score) / 10);
      d.score = score;
      d.conditions = conditions;
      
      // Generate signal
      if (score >= 5 && d.confidence >= CONFIG.minConfidence) {
        d.signal = 'STRONG_BUY';
      } else if (score >= 3) {
        d.signal = 'BUY';
      } else if (score <= -5 && d.confidence >= CONFIG.minConfidence) {
        d.signal = 'STRONG_SELL';
      } else if (score <= -3) {
        d.signal = 'SELL';
      } else {
        d.signal = 'NEUTRAL';
      }
    }

    // ================= UI RENDERING =================
    function render() {
      const container = document.getElementById('cards');
      container.innerHTML = Object.entries(data).map(([sym, d]) => {
        const cardClass = d.signal === 'STRONG_BUY' ? 'strong-buy' : d.signal === 'STRONG_SELL' ? 'strong-sell' : '';
        const signalClass = d.signal.toLowerCase().replace('_', '-');
        const isUp = d.cvd >= 0;
        
        return `
          <div class="card ${cardClass}">
            <div class="row">              <div class="name">${sym}</div>
              <div class="price ${d.price > d.vwap ? 'up' : 'down'}">$${d.price.toFixed(2)}</div>
            </div>
            
            <div class="grid">
              <div class="box">
                <div class="label">CVD</div>
                <div class="value">${d.cvd.toFixed(2)}</div>
              </div>
              <div class="box">
                <div class="label">VWAP</div>
                <div class="value">$${d.vwap.toFixed(0)}</div>
              </div>
              <div class="box">
                <div class="label">RSI</div>
                <div class="value">${d.rsi.toFixed(0)}</div>
              </div>
              <div class="box">
                <div class="label">Trades</div>
                <div class="value">${d.trades}</div>
              </div>
            </div>
            
            <div class="confluence">
              ${d.conditions.map(c => `
                <div class="cond">
                  <span class="dot ${c.val > 0 ? 'green' : c.val < 0 ? 'red' : 'gray'}"></span>
                  <span>${c.name}</span>
                </div>
              `).join('')}
            </div>
            
            ${d.divergence !== 'none' ? `
              <div class="divergence ${d.divergence}">
                ⚠️ ${d.divergence === 'bullish' ? 'BULLISH' : 'BEARISH'} DIVERGENCE DETECTED
              </div>
            ` : ''}
            
            <div class="signal ${signalClass}">
              ${d.signal.replace('_', ' ')}
            </div>
            <div class="confidence">
              Confidence: ${(d.confidence * 100).toFixed(0)}% | Score: ${d.score.toFixed(1)}/10
            </div>
            
            <div class="risk-box">
              ⚠️ Risk: ${CONFIG.riskPerTrade * 100}% per trade | SL: ${CONFIG.stopLossPct * 100}%
            </div>
            
            <button class="btn ${d.signal.includes('BUY') ? 'btn-success' : d.signal.includes('SELL') ? 'btn-danger' : 'btn-primary'}"                     onclick="logTrade('${sym}', '${d.signal}', ${d.price})">
              📝 LOG ${d.signal.includes('BUY') ? 'LONG' : d.signal.includes('SELL') ? 'SHORT' : 'TRADE'}
            </button>
          </div>
        `;
      }).join('');
    }

    // ================= PAPER TRADING =================
    function logTrade(sym, signal, price) {
      const type = signal.includes('BUY') ? 'LONG' : signal.includes('SELL') ? 'SHORT' : 'NEUTRAL';
      if (type === 'NEUTRAL') {
        alert('Wait for a clear signal!');
        return;
      }
      
      const trade = {
        sym, type, entry: price, exit: null, pnl: 0,
        time: new Date().toLocaleString(),
        sl: price * (1 - CONFIG.stopLossPct * (type === 'LONG' ? 1 : -1))
      };
      
      trades.unshift(trade);
      localStorage.setItem('cvd_trades', JSON.stringify(trades));
      
      if (navigator.vibrate) navigator.vibrate(50);
      alert(`Trade logged!\n${sym} ${type} @ $${price.toFixed(2)}\nSL: $${trade.sl.toFixed(2)}`);
      updateStats();
    }

    function closeTrade(index, exitPrice) {
      if (!trades[index] || trades[index].exit) return;
      
      const t = trades[index];
      const pnl = t.type === 'LONG' 
        ? (exitPrice - t.entry) / t.entry * 100
        : (t.entry - exitPrice) / t.entry * 100;
      
      t.exit = exitPrice;
      t.pnl = pnl;
      t.closedAt = new Date().toLocaleString();
      
      localStorage.setItem('cvd_trades', JSON.stringify(trades));
      updateStats();
      alert(`Trade closed!\nP&L: ${pnl.toFixed(2)}%`);
    }

    function updateStats() {
      const total = trades.length;
      const closed = trades.filter(t => t.exit);      const wins = closed.filter(t => t.pnl > 0).length;
      const winRate = closed.length > 0 ? (wins / closed.length * 100).toFixed(1) : 0;
      const totalPnL = closed.reduce((sum, t) => sum + t.pnl, 0);
      
      document.getElementById('stat-total').textContent = total;
      document.getElementById('stat-winrate').textContent = `${winRate}%`;
      const pnlEl = document.getElementById('stat-pnl');
      pnlEl.textContent = `${totalPnL >= 0 ? '+' : ''}${totalPnL.toFixed(2)}%`;
      pnlEl.style.color = totalPnL >= 0 ? '#00ff88' : '#ff3366';
      
      const list = document.getElementById('trade-list');
      if (trades.length === 0) {
        list.innerHTML = '<div style="text-align:center;color:#6b7280;padding:1rem">No trades yet</div>';
      } else {
        list.innerHTML = trades.slice(0, 20).map((t, i) => `
          <div class="trade-item ${t.type === 'LONG' ? 'buy' : 'sell'}">
            <div>
              <div><strong>${t.sym}</strong> ${t.type}</div>
              <div style="color:#6b7280;font-size:0.7rem">${t.time}</div>
              <div style="font-size:0.75rem">Entry: $${t.entry.toFixed(2)} | SL: $${t.sl.toFixed(2)}</div>
            </div>
            <div style="text-align:right">
              <div>${t.exit ? `$${t.exit.toFixed(2)}` : 'OPEN'}</div>
              <div style="color:${t.pnl > 0 ? '#00ff88' : t.pnl < 0 ? '#ff3366' : '#6b7280'}">
                ${t.exit ? `${t.pnl >= 0 ? '+' : ''}${t.pnl.toFixed(2)}%` : ''}
              </div>
              ${!t.exit ? `<button class="btn btn-primary" style="padding:0.3rem 0.6rem;font-size:0.7rem;margin-top:0.3rem" onclick="closeTrade(${i}, ${data[t.sym].price})">Close</button>` : ''}
            </div>
          </div>
        `).join('');
      }
    }

    // ================= NAVIGATION =================
    function showView(view) {
      document.querySelectorAll('.nav-item').forEach((el, i) => {
        el.classList.toggle('active', (view === 'signals' && i === 0) || (view === 'trades' && i === 1) || (view === 'stats' && i === 2));
      });
      
      if (view === 'trades' || view === 'stats') {
        document.getElementById('tradeModal').classList.add('active');
        updateStats();
      } else {
        document.getElementById('tradeModal').classList.remove('active');
      }
    }

    function closeModal() {
      document.getElementById('tradeModal').classList.remove('active');
    }
    // ================= INIT =================
    window.addEventListener('DOMContentLoaded', () => {
      render();
      setTimeout(connect, 1000);
    });
  </script>
</body>
</html>
